<head>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<div
  class="flex flex-col justify-center items-center gap-y-5 lg:items-start lg:gap-x-2 lg:flex-row"
>
  <div class="flex flex-col justify-center items-center gap-y-3 pt-2">
    <input id="tag" type="text" placeholder="image" />
    <input
      id="slider-density"
      type="range"
      min="0"
      max="1"
      step="0.01"
      value="0.5"
      class="slider"
    />
    <input
      id="slider-grainsize"
      type="range"
      min="0.25"
      max="2"
      step="0.01"
      value="0.5"
      class="slider"
    />
  </div>
  <div class="flex justify-center w-fit">
    <canvas
      id="canvas"
      class="block w-[75%] lg:w-full lg:max-w-[700px] aspect-square h-auto touch-none cursor-grab active:cursor-grabbing"
    ></canvas>
  </div>
</div>
<script id="vertex_shader" type="x-shader/x-vertex">
  // Which part of the image goes on which part of the triangle?
  // That is why we define texCoord attribute
  attribute vec2 a_position;
  attribute vec2 a_tex_coord;
  uniform vec2 u_resolution;
  varying vec2 v_tex_coord;

  void main() {
     // convert coordinates to clip-space
     vec2 zero_to_one = a_position / u_resolution;
     vec2 zero_to_two = zero_to_one * 2.0;
     vec2 clip_space = zero_to_two - 1.0;
     gl_Position = vec4(clip_space*vec2(1,-1), 0, 1); // flip y-axis

     // pass the texCoord to the fragment shader
     // The GPU will interpolate this value between points.
     v_tex_coord = a_tex_coord;
  }
</script>
<script id="fragment_shader" type="x-shader/x-fragment">
  precision highp float;

  uniform sampler2D u_image;
  uniform vec2 u_resolution;
  varying vec2 v_tex_coord;
  uniform float blend_val;
  uniform float grainsize;

  float rand(vec2 co){
    return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453);
  }

  // Brightness
  vec4 grain(vec4 fragColor){
    vec4 color = fragColor;

    vec2 cell = floor(gl_FragCoord.xy / grainsize);
    float diff = rand(cell) - 0.5;

    color.rgb += diff;
    return color;
  }

  void main() {
      vec2 uv = gl_FragCoord.xy / u_resolution;
      vec4 color = texture2D(u_image, v_tex_coord);
      vec4 grain_val = grain(color);
      gl_FragColor = mix(color, grain_val, blend_val);

  }
</script>

<script src="https://greggman.github.io/webgl-lint/webgl-lint.js"></script>
<script src="https://webglfundamentals.org/webgl/resources/webgl-utils.js"></script>
